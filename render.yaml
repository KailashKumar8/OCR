services:
  - type: web
    name: ocr-basic
    env: python
    plan: free
    rootDir: ocr_basic
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: OCR_PROVIDER
        value: nvidia
      - key: OCR_MODEL
        value: nvidia/llama-3.1-nemotron-nano-vl-8b-v1
      - key: OCR_API_URL
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: OCR_ENGINE
        value: openai
      - key: OCR_API_KEY
        sync: false
